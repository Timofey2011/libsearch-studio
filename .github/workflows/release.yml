name: Release

# MANUAL FALLBACK ONLY. The normal release path is scripts/publish_release.sh,
# which builds the dmg locally (free) and uploads it. This workflow used to
# fire on every tag push, rebuilding the same dmg cold on a macOS runner —
# at GitHub's 10x macOS billing that was ~220 billed minutes per release for
# zero added value (it burned most of a 2,000-minute monthly allotment in one
# session). Dispatch it by hand only when a release must be built away from a
# Mac: Actions → Release → Run workflow → enter the tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to build and release (e.g. v0.7.0)"
        required: true

permissions:
  contents: write # create releases + upload assets

jobs:
  release:
    runs-on: macos-latest # Apple Silicon → arm64 build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install protoc
        run: brew install protobuf
      - run: pnpm --dir frontend install --frozen-lockfile

      # Run the Tauri CLI from the repo root so src-tauri/ is discoverable.
      - name: Build app bundle
        run: ./frontend/node_modules/.bin/tauri build --bundles app

      # hdiutil-only dmg (tauri's own dmg target needs Finder automation, which
      # fails on a headless runner).
      - name: Package .dmg
        run: ./scripts/make_dmg.sh

      - name: Assemble release notes
        id: notes
        run: |
          set -euo pipefail
          DMG=$(ls target/release/bundle/dmg/*_arm64.dmg | head -1)
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          {
            # The tagged commit's body is the human-written release notes.
            git tag -l --format='%(contents:body)' "${{ inputs.tag }}"
            echo
            echo '### Install (macOS, Apple Silicon)'
            echo
            echo 'Open the `.dmg` and drag **LibSearch Studio** to Applications. This build is **not notarized**, so on first launch macOS blocks it as coming from an unidentified developer — **right-click the app → Open**, then confirm. (Or clear quarantine: `xattr -dr com.apple.quarantine "/Applications/LibSearch Studio.app"`.)'
            echo
            echo 'First run walks you through adding a library and downloading the local search models.'
            echo
            echo '```'
            echo "SHA-256  $SHA"
            echo '```'
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: ${{ steps.notes.outputs.dmg }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
