<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>§17 DOM-side citation harness</title>
<style>
  body { font: 13px/1.4 -apple-system, sans-serif; margin: 16px; }
  #log { white-space: pre-wrap; }
  #view-host { position: absolute; left: -9999px; width: 800px; height: 600px; }
  #done { font-weight: bold; }
</style>
</head>
<body>
<h3>§17 DOM-side citation harness</h3>
<div id="log">starting…</div>
<div id="done"></div>
<pre id="json"></pre>
<div id="view-host"></div>
<script type="module">
// Verbatim replicas of frontend/src/BookReader.tsx (§17 cross-pins).
import "./foliate/view.js";

function normText(s) {
  return s
    .replace(/­/g, "")
    .replace(/(\w)-\s+(\w)/g, "$1$2")
    .replace(/\s+/g, " ")
    .trim();
}
function normChapter(s) {
  return normText(s)
    .replace(/^(chapter|глава|часть|part)\s+(\d+|[ivxlcdm]+)\.?:?\s+/i, "")
    .replace(/^[\d.]+\s*[.:—-]?\s*/, "")
    .replace(/^[ivxlcdm]+\.\s+/i, "")
    .toLowerCase();
}
function findTocEntry(toc, stored) {
  const want = normChapter(stored);
  if (!want) return null;
  const exact = toc.find((t) => normChapter(t.label ?? "") === want);
  if (exact) return exact;
  if (want.length >= 6) {
    const contained = toc.find((t) => {
      const l = normChapter(t.label ?? "");
      return l.length >= 6 && (l.includes(want) || want.includes(l));
    });
    if (contained) return contained;
  }
  const tokens = (s) => new Set(s.split(" ").filter((w) => w.length >= 3));
  const wt = tokens(want);
  if (wt.size < 2) return null;
  let best = null, bestScore = 0;
  for (const t of toc) {
    const lt = tokens(normChapter(t.label ?? ""));
    if (!lt.size) continue;
    let common = 0;
    for (const w of wt) if (lt.has(w)) common++;
    const score = common / (wt.size + lt.size - common);
    if (common >= 2 && score >= 0.6 && score > bestScore) { best = t; bestScore = score; }
  }
  return best;
}
function flattenToc(items, out = []) {
  for (const it of items ?? []) {
    out.push(it);
    flattenToc(it.subitems ?? undefined, out);
  }
  return out;
}
function flattenTocDepth(items, depth = 0, out = []) {
  for (const it of items ?? []) {
    out.push({ item: it, depth });
    flattenTocDepth(it.subitems ?? undefined, depth + 1, out);
  }
  return out;
}
function probeOf(cite) {
  const words = normText(cite).split(" ");
  const wordy = (w) => (w.match(/\p{L}/gu) ?? []).length >= 2;
  let at = words.findIndex((_, i) => i + 8 <= words.length && words.slice(i, i + 8).every(wordy));
  if (at < 0) at = 0;
  return words.slice(at, at + 8).join(" ");
}

const log = (m) => { document.getElementById("log").textContent += "\n" + m; };
const manifest = await (await fetch("./manifest.json")).json();
// ?only=pdf / ?only=epub — the epub pass is ~15 min; pdf iterations shouldn't pay it.
const only = new URLSearchParams(location.search).get("only");
if (only === "pdf") manifest.epub = [];
if (only === "epub") manifest.pdf = [];
const results = { epub: [], pdf: [] };

// ---- epub: the real foliate search ----------------------------------------
const host = document.getElementById("view-host");
for (const book of manifest.epub) {
  let view = null;
  try {
    const res = await fetch("./" + book.file);
    if (!res.ok) throw new Error("fetch " + res.status);
    const blob = await res.blob();
    const file = new File([blob], book.file.split("/").pop());
    view = document.createElement("foliate-view");
    host.append(view);
    await view.open(file);
    const tocd = flattenTocDepth(view.book.toc);
    const toc = tocd.map((t) => t.item);
    for (const c of book.cases) {
      const t0 = performance.now();
      const probe = probeOf(c.cite);
      let outcome = "cold-miss";
      let chapterResolved = false;
      try {
        let sectionIndex = null;
        let sectionEnd = null;
        if (c.chapter) {
          const hit = findTocEntry(toc, c.chapter);
          if (hit) {
            chapterResolved = true;
            const resolved = await view.book.resolveHref(hit.href);
            if (resolved && typeof resolved.index === "number") {
              sectionIndex = resolved.index;
              sectionEnd = sectionIndex + 40;
              const at = tocd.findIndex((t) => t.item === hit);
              const hitDepth = at >= 0 ? tocd[at].depth : 0;
              for (let i = at + 1; i < tocd.length; i++) {
                if (tocd[i].depth > hitDepth) continue;
                const r = await Promise.resolve(view.book.resolveHref(tocd[i].item.href)).catch(() => null);
                if (r && typeof r.index === "number" && r.index > sectionIndex) {
                  sectionEnd = Math.min(sectionEnd, r.index);
                  break;
                }
              }
            }
          }
        }
        const firstHit = async (index) => {
          for await (const r of view.search({ query: probe, ...(index != null ? { index } : {}) })) {
            if (typeof r === "string") break;
            if (r.subitems?.length) return r.subitems[0].cfi;
            if (r.cfi) return r.cfi;
          }
          return null;
        };
        let phase1 = null;
        if (sectionIndex != null) {
          for (let i = sectionIndex; i < (sectionEnd ?? sectionIndex + 1) && !phase1; i++) {
            phase1 = await firstHit(i);
          }
        }
        if (phase1) outcome = "direct";
        else if (await firstHit()) outcome = "located";
        else outcome = chapterResolved ? "miss-in-chapter" : "cold-miss";
        view.clearSearch?.();
      } catch (e) {
        outcome = "case-error:" + String(e).slice(0, 80);
      }
      results.epub.push({ book: book.title, id: c.id, chapterResolved, outcome,
                          ms: Math.round(performance.now() - t0) });
    }
    log(`epub ok: ${book.title}`);
  } catch (e) {
    for (const c of book.cases)
      results.epub.push({ book: book.title, id: c.id, outcome: "open-error:" + String(e).slice(0, 80) });
    log(`epub OPEN FAIL: ${book.title}: ${e}`);
  } finally {
    view?.remove();
  }
}

// ---- pdf: replica of PdfReader.locateCite (v0.16.3 highlight) -------------
// Mirrors the shipped matcher exactly: `joined` concatenates item strings with
// NO separator (only \n at EOL) — the same string `starts` indexes — and the
// probe is matched as a \s*-joined regex so a phrase spanning two text items
// still hits. Outcomes are what the user sees: a highlight, or the overlay.
const pdfjs = await import("./pdfjs-dist/build/pdf.mjs");
pdfjs.GlobalWorkerOptions.workerSrc = "./pdfjs-dist/build/pdf.worker.mjs";
const rxOf = (words) =>
  new RegExp(words.map((w) => w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("\\s*"), "i");
for (const book of manifest.pdf) {
  let doc = null;
  try {
    doc = await pdfjs.getDocument({
      url: "./" + book.file,
      cMapUrl: "./pdfjs-assets/cmaps/", cMapPacked: true,
      standardFontDataUrl: "./pdfjs-assets/standard_fonts/",
      useWorkerFetch: false,
    }).promise;
    const cache = new Map();
    const pageText = async (n) => {
      if (n < 1 || n > doc.numPages) return null;
      if (cache.has(n)) return cache.get(n);
      const page = await doc.getPage(n);
      const reader = page.streamTextContent().getReader();
      const items = [];
      for (;;) {
        const { value, done } = await reader.read();
        if (done) break;
        if (value?.items) items.push(...value.items);
      }
      let joined = "";
      const starts = [];
      for (const it of items) {
        if (typeof it.str !== "string") continue;
        starts.push(joined.length);
        joined += it.str + (it.hasEOL ? "\n" : "");
      }
      const out = { joined, starts };
      cache.set(n, out);
      return out;
    };
    for (const c of book.cases) {
      const words = probeOf(c.cite).split(" ");
      const full = rxOf(words);
      const short = words.length > 4 ? rxOf(words.slice(0, 4)) : null;
      const hit = async (n, re) => {
        const pt = await pageText(n);
        return pt ? re.test(pt.joined) : false;
      };
      let outcome;
      if (c.page == null || c.page < 0) outcome = "no-page";
      else if (await hit(c.page, full)) outcome = "highlight-on-page";
      else if (await hit(c.page - 1, full) || await hit(c.page + 1, full))
        outcome = "highlight-near";
      else if (short && await hit(c.page, short)) outcome = "highlight-short";
      else outcome = "overlay-miss";
      results.pdf.push({ book: book.title, id: c.id, page: c.page, outcome });
    }
    log(`pdf ok: ${book.title} (${doc.numPages}p)`);
  } catch (e) {
    for (const c of book.cases)
      results.pdf.push({ book: book.title, id: c.id, outcome: "open-error:" + String(e).slice(0, 80) });
    log(`pdf OPEN FAIL: ${book.title}: ${e}`);
  } finally {
    // destroy() lives on the loading task in some builds; guard it.
    try { doc?.destroy?.(); } catch { /* nothing to release */ }
  }
}

const tally = (rows) => {
  const t = {};
  for (const r of rows) t[r.outcome.split(":")[0]] = (t[r.outcome.split(":")[0]] ?? 0) + 1;
  return t;
};
document.getElementById("json").textContent = JSON.stringify(
  { epubTally: tally(results.epub), pdfTally: tally(results.pdf), results }, null, 1);
document.getElementById("done").textContent =
  "DONE epub=" + JSON.stringify(tally(results.epub)) + " pdf=" + JSON.stringify(tally(results.pdf));
</script>
</body>
</html>
