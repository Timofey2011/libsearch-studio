name: CI

# COST NOTE: macOS runners bill at 10x — CI deliberately runs ubuntu-only.
# macOS is exercised constantly by local development and the local release
# script (scripts/publish_release.sh); paying 10x to smoke-build it again in CI
# added no signal and helped exhaust a 2,000-minute monthly allotment. The
# ubuntu jobs are the only coverage a macOS dev machine can't provide.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "CHANGELOG.md"
  pull_request:

# A superseded push cancels the previous in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast, offline engine checks. Excludes the `app` (Tauri) crate, whose build
  # couples to the frontend dist + system WebView libs (covered by `bundle`).
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --exclude app --all-targets -- -D warnings
      - run: cargo test --workspace --exclude app

  # Smoke-build the desktop app on Linux only (deb is the lightest bundle).
  # macOS is covered by local dev + the local release build; see COST NOTE.
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libwebkit2gtk-4.1-dev \
            libgtk-3-dev librsvg2-dev patchelf
      - run: pnpm --dir frontend install --frozen-lockfile
      # Run the Tauri CLI from the repo root so src-tauri/ is discoverable.
      - name: Build app bundle
        run: ./frontend/node_modules/.bin/tauri build --bundles deb
