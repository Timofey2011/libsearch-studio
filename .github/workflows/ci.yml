name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast, offline engine checks. Excludes the `app` (Tauri) crate, whose build
  # couples to the frontend dist + system WebView libs (covered by `bundle`).
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --exclude app --all-targets -- -D warnings
      - run: cargo test --workspace --exclude app

  # Smoke-build the desktop app (no installers, no signing) on both platforms.
  # The bundle target is per-OS: `app` (.app) exists only on macOS; Linux offers
  # deb/rpm/appimage — deb is the lightest smoke-build.
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundles: app
          - os: ubuntu-latest
            bundles: deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libwebkit2gtk-4.1-dev \
            libgtk-3-dev librsvg2-dev patchelf
      - run: pnpm --dir frontend install --frozen-lockfile
      # Run the Tauri CLI from the repo root so src-tauri/ is discoverable.
      - name: Build app bundle
        run: ./frontend/node_modules/.bin/tauri build --bundles ${{ matrix.bundles }}
